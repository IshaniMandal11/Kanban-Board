services:
  - type: web
    name: kanban-board
    env: python
    rootDir: django_series/isha
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py setup_kanban
    startCommand: gunicorn isha.wsgi
    envVars:
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
